<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>クイズ管理画面</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>クイズ管理</h1>
        <p class="subtitle">問題編集・回答状況の確認・抽選を行います。</p>
      </header>

      <section class="card">
        <h2>クイズ設定</h2>
        <div class="form-row">
          <label for="admin-title">タイトル</label>
          <input id="admin-title" type="text" placeholder="例: 本日の大抽選会クイズ" />
        </div>
        <div class="form-row">
          <label for="admin-question">問題文</label>
          <textarea id="admin-question" rows="3" placeholder="問題文を入力してください"></textarea>
        </div>
        <div class="form-row">
          <label>選択肢</label>
          <div id="options-container"></div>
          <button id="add-option-btn" class="secondary small">選択肢を追加</button>
        </div>
        <div class="form-row">
          <label for="admin-correct">正解の選択肢</label>
          <select id="admin-correct"></select>
        </div>
        <div class="form-row checkbox-row">
          <label>
            <input type="checkbox" id="reset-responses" />
            回答履歴をリセットする
          </label>
        </div>
        <button id="save-config-btn" class="primary">設定を保存</button>
        <p id="config-message" class="message"></p>
      </section>

      <section class="card">
        <h2>回答一覧</h2>
        <p>
          <a href="/summary.html" class="link-back">選択肢ごとの集計・テーブル別集計を見る →</a>
        </p>
        <button id="reload-responses-btn" class="secondary small">再読み込み</button>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>テーブル</th>
                <th>名前</th>
                <th>回答</th>
                <th>正解</th>
                <th>回答時刻</th>
              </tr>
            </thead>
            <tbody id="responses-body"></tbody>
          </table>
        </div>
      </section>

      <section class="card">
        <h2>正解発表 ＆ 抽選</h2>
        <button id="reload-correct-btn" class="secondary small">正解者を再読み込み</button>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>テーブル</th>
                <th>名前</th>
              </tr>
            </thead>
            <tbody id="correct-body"></tbody>
          </table>
        </div>

        <div class="roulette-section">
          <button id="draw-btn" class="primary">正解を確定して抽選を開始</button>
          <div id="roulette-display" class="roulette-display">抽選待機中</div>
          <p id="winner-message" class="message highlight"></p>
        </div>
      </section>
    </div>

    <!-- 抽選フルスクリーン演出 -->
    <div id="draw-overlay" class="draw-overlay hidden">
      <div class="draw-overlay-inner">
        <div id="draw-phase-candidates" class="draw-phase">
          <h2 class="draw-title">正解者</h2>
          <p class="draw-subtitle">この中から当選者を抽選します</p>
          <ul id="draw-candidates-list" class="draw-candidates-list"></ul>
          <div class="draw-cta-row">
            <button type="button" id="draw-back-btn" class="secondary draw-cta">戻る</button>
            <button type="button" id="draw-start-btn" class="primary draw-cta">抽選を開始</button>
          </div>
        </div>
        <div id="draw-phase-roulette" class="draw-phase hidden">
          <p class="draw-roulette-label">抽選中...</p>
          <div id="draw-roulette-name" class="draw-roulette-name"></div>
        </div>
        <div id="draw-phase-winner" class="draw-phase hidden">
          <p class="draw-winner-label">当選者</p>
          <div id="draw-winner-name" class="draw-winner-name"></div>
          <button type="button" id="draw-close-btn" class="primary draw-cta">閉じる</button>
        </div>
      </div>
    </div>

    <script src="admin.js"></script>
  </body>
  </html>
